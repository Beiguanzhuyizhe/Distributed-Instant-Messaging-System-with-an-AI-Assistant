<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Chat System</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/login.css">
  <link rel="stylesheet" href="css/chat.css">

  <!-- React 18 (CDN) - production build -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- GSAP -->
  <script src="https://unpkg.com/gsap@3/dist/gsap.min.js"></script>
</head>
<body>
  <div id="app"></div>

  <!-- Bridge (must load first) -->
  <script src="js/bridge.js"></script>

  <!-- 全局错误捕获（帮助定位黑屏原因） -->
  <script>
  window.addEventListener('error', function (e) {
    var el = document.createElement('div');
    el.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#ff5252;color:#fff;padding:12px;font-size:13px;z-index:9999;font-family:monospace;white-space:pre-wrap;max-height:120px;overflow:auto;';
    el.textContent = '[JS Error] ' + (e.error ? e.error.stack || e.error.message : e.message || e);
    document.body.appendChild(el);
  });
  window.addEventListener('unhandledrejection', function (e) {
    var el = document.createElement('div');
    el.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#ff9800;color:#fff;padding:12px;font-size:13px;z-index:9999;font-family:monospace;white-space:pre-wrap';
    el.textContent = '[Promise Error] ' + (e.reason ? e.reason.stack || e.reason.message : e.reason || e);
    document.body.appendChild(el);
  });
  </script>

  <!-- Particles background -->
  <script src="js/particles.js"></script>

  <!-- React components (plain JS, no Babel/JSX needed) -->
  <script src="js/login.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/message-area.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
