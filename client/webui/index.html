<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Chat System</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/login.css">
  <link rel="stylesheet" href="css/chat.css">

  <!-- React & Babel (CDN) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- GSAP -->
  <script src="https://unpkg.com/gsap@3/dist/gsap.min.js"></script>
</head>
<body>
  <div id="app"></div>

  <!-- Bridge (plain JS, must load first) -->
  <script src="js/bridge.js"></script>

  <!-- Particles background -->
  <script src="js/particles.js"></script>

  <!-- React components (JSX via Babel standalone) -->
  <script type="text/babel" src="js/login.jsx"></script>
  <script type="text/babel" src="js/sidebar.jsx"></script>
  <script type="text/babel" src="js/message-area.jsx"></script>
  <script type="text/babel" src="js/chat.jsx"></script>
  <script type="text/babel" src="js/app.jsx"></script>
</body>
</html>
